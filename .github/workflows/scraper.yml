name: Web3 Job Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser lxml

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run scraper
        run: python web3_job_scraper.py > digest.txt 2>/dev/null

      - name: Send to Telegram
        run: |
          python - <<'EOF'
          import urllib.request, json, os

          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          body = open("digest.txt").read()

          # Strip HTML tags for plain text
          import re
          body = re.sub(r'<[^>]+>', '', body)

          chunks = [body[i:i+4000] for i in range(0, len(body), 4000)]
          for chunk in chunks:
              if not chunk.strip():
                  continue
              data = json.dumps({
                  "chat_id": chat_id,
                  "text": chunk
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  headers={"Content-Type": "application/json"}
              )
              resp = urllib.request.urlopen(req)
              print(f"Sent chunk, response: {resp.status}")
          EOF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
