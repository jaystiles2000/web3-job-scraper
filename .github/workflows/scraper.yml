name: Web3 Job Scraper

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily
  workflow_dispatch:        # lets you trigger it manually too

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser lxml

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run scraper
        run: run: python web3_job_scraper.py > digest.txt

      - name: Send to Slack
        run: |
          python - <<'EOF'
          import urllib.request, json, os
          body = open("digest.txt").read()
          # Slack has a 4000 char limit per message, chunk if needed
          chunks = [body[i:i+3900] for i in range(0, len(body), 3900)]
          for chunk in chunks:
              data = json.dumps({"text": chunk}).encode()
              req = urllib.request.Request(
                  os.environ['SLACK_WEBHOOK'],
                  data=data,
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
          print("Sent to Slack!")
          EOF
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
