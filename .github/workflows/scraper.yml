name: Web3 Job Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser lxml

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: seen_jobs.json
          key: seen-data-${{ github.run_id }}
          restore-keys: seen-data-

      - name: Run job scraper
        run: python web3_job_scraper.py > jobs_digest.txt

      - name: Send jobs to Telegram
        run: |
          python - <<'EOF'
          import urllib.request, json, os

          token = os.environ['TELEGRAM_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          body = open("jobs_digest.txt").read().strip()

          if not body or "No new jobs" in body:
              print("No new jobs to send")
              exit(0)

          chunks = [body[i:i+4000] for i in range(0, len(body), 4000)]
          for chunk in chunks:
              if not chunk.strip():
                  continue
              data = json.dumps({
                  "chat_id": chat_id,
                  "text": chunk,
                  "parse_mode": "HTML",
                  "disable_web_page_preview": True
              }).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
          print("Jobs sent!")
          EOF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
